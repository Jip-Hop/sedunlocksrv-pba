
NET_MODE="single"           # single | bond
NET_IFACES=""               # empty = autodetect, otherwise e.g. "eth0 eth1"
NET_EXCLUDE=""              # interfaces to skip entirely
NET_DHCP="true"             # true = DHCP, false = static IPv4

IP_ADDR="192.168.10.230"    # used when NET_DHCP=false
NETMASK="255.255.255.0"     # used when NET_DHCP=false
GATEWAY="192.168.10.253"    # optional
DNS="192.168.10.252"        # optional, space-separated if multiple

BOND_MODE="4"               # explicit bond default: 4 = 802.3ad/LACP
BOND_MIIMON="100"           # link monitor interval in ms
BOND_LACP_RATE="1"          # 1 = fast LACPDU rate
BOND_XMIT_HASH_POLICY="1"   # default transmit hash policy
TLS_SERVER_NAME="localhost" # SSH UI verifies this certificate name while still connecting to 127.0.0.1:443
SSH_CURL_INSECURE="auto"    # auto trusts bundled self-signed cert; custom certs use normal CA validation unless forced true
EXPERT_PASSWORD_HASH=""    # bcrypt hash used by expert-mode authentication

# Password Complexity Settings
PASSWORD_COMPLEXITY_ON="true"  # true/false to enable/disable password complexity enforcement
MIN_PASSWORD_LENGTH="12"       # minimum password length (when complexity is on)
REQUIRE_UPPER="true"           # require uppercase letters
REQUIRE_LOWER="true"           # require lowercase letters
REQUIRE_NUMBER="true"          # require numeric digits
REQUIRE_SPECIAL="true"         # require special characters
