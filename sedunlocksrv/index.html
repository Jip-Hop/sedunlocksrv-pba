<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SED Unlock Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a202c; color: #e2e8f0; }
        .tab-active { border-color: #60a5fa; color: #60a5fa; }
        .tab-inactive { border-color: transparent; color: #94a3b8; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">🔑 SED Unlock Service</h1>
        
        <!-- Tab Navigation -->
        <div class="flex mb-6 border-b border-gray-700">
            <button id="unlock-tab-btn" class="w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-active focus:outline-none transition-all">
                Unlock
            </button>
            <button id="change-tab-btn" class="w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-inactive hover:text-gray-200 focus:outline-none transition-all">
                Change Password
            </button>
        </div>

        <div id="message-area" class="hidden text-center p-3 rounded mb-4"></div>

        <!-- Unlock Tab Content -->
        <div id="unlock-container">
            <form id="unlock-form" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Disk Password</label>
                    <input type="password" id="password" required 
                           class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 focus:outline-none transition text-white pass-field">
                </div>
                <div class="flex items-center mb-2">
                    <input type="checkbox" id="show-pass-unlock" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded">
                    <label for="show-pass-unlock" class="ml-2 text-sm font-medium text-gray-400 cursor-pointer">Show Password</label>
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition">
                    Unlock Drive(s)
                </button>
            </form>

            <button id="boot-btn" class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded mt-4 transition">
                🚀 Boot Proxmox (kexec)
            </button>

            <button id="reboot-btn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded mt-4 transition">
                Reboot System
            </button>
        </div>

        <!-- Change Password Tab Content -->
        <div id="change-container" class="hidden">
            <form id="change-form" class="space-y-4">
                <div>
                    <label for="current-password" class="block text-sm font-medium text-gray-400 mb-1">Current Password</label>
                    <input type="password" id="current-password" required class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white pass-field">
                </div>
                <div>
                    <label for="new-password" class="block text-sm font-medium text-gray-400 mb-1">New Password</label>
                    <input type="password" id="new-password" required class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 text-white pass-field">
                </div>
                <div class="flex items-center mb-2">
                    <input type="checkbox" id="show-pass-change" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded">
                    <label for="show-pass-change" class="ml-2 text-sm font-medium text-gray-400 cursor-pointer">Show Passwords</label>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                    Update Password
                </button>
            </form>
        </div>

        <p class="mt-6 text-xs text-center text-gray-500 italic">Management functions are available until kexec jump.</p>
    </div>

    <script>
        const unlockBtn = document.getElementById('unlock-tab-btn');
        const changeBtn = document.getElementById('change-tab-btn');
        const unlockCont = document.getElementById('unlock-container');
        const changeCont = document.getElementById('change-container');
        const msgArea = document.getElementById('message-area');

        // TAB SWITCHING LOGIC
        function switchTab(target) {
            if (target === 'unlock') {
                unlockCont.classList.remove('hidden');
                changeCont.classList.add('hidden');
                unlockBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-active focus:outline-none";
                changeBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-inactive focus:outline-none";
            } else {
                changeCont.classList.remove('hidden');
                unlockCont.classList.add('hidden');
                changeBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-active focus:outline-none";
                unlockBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-inactive focus:outline-none";
            }
        }

        unlockBtn.addEventListener('click', () => switchTab('unlock'));
        changeBtn.addEventListener('click', () => switchTab('change'));

        // SHOW/HIDE PASSWORD
        document.getElementById('show-pass-unlock').addEventListener('change', function() {
            document.getElementById('password').type = this.checked ? 'text' : 'password';
        });
        document.getElementById('show-pass-change').addEventListener('change', function() {
            document.getElementById('current-password').type = this.checked ? 'text' : 'password';
            document.getElementById('new-password').type = this.checked ? 'text' : 'password';
        });

        // UNLOCK FORM
        const unlockForm = document.getElementById('unlock-form');
        const bootBtn = document.getElementById('boot-btn');
        const submitBtn = document.getElementById('submit-btn');

        // Expose function globally so the "Try again" link can call it
        window.resetUnlockForm = function() {
            unlockForm.classList.remove('hidden');
            document.getElementById('password').value = '';
            submitBtn.disabled = false;
            submitBtn.innerText = "Unlock Drive(s)";
        };

        unlockForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "⌛ Processing...";

            try {
                const response = await fetch('/unlock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.getElementById('password').value })
                });
                const data = await response.json();

                if (response.ok) {
                    let statusHtml = `<div class="text-green-400 font-bold mb-2">✅ Unlock Attempt Completed</div><ul class="text-xs text-left space-y-1">`;
                    let anySuccess = false, allDone = true;
                    
                    data.drives.forEach(d => {
                        statusHtml += `<li>${d.locked ? '❌' : '✅'} ${d.device}: ${d.locked ? 'LOCKED' : 'UNLOCKED'}</li>`;
                        if (!d.locked) anySuccess = true;
                        if (d.locked) allDone = false;
                    });

                    if (!allDone) {
                        statusHtml += `</ul><button onclick="resetUnlockForm()" class="mt-3 text-blue-400 text-xs hover:underline block w-full">🔓 Try another password for remaining drives?</button>`;
                    } else { statusHtml += `</ul>`; }

                    msgArea.innerHTML = statusHtml;
                    msgArea.className = "block bg-gray-900/50 p-3 rounded mb-4 border border-gray-700";

                    if (anySuccess) {
                        unlockForm.classList.add('hidden');
                        bootBtn.classList.remove('hidden');
                    }
                }
            } catch (err) {
                msgArea.innerText = "❌ Network Error";
                msgArea.className = "block text-red-400 font-bold bg-red-900/30 p-2 rounded mb-4";
                resetUnlockForm();
            }
        });

        // REBOOT & BOOT
        document.getElementById('reboot-btn').addEventListener('click', () => fetch('/reboot', { method: 'POST' }));
        bootBtn.addEventListener('click', () => { if(confirm("Jump to OS?")) fetch('/boot', { method: 'POST' }); });
    </script>
</body>
</html>
