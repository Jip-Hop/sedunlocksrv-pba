<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>SED Unlock</title>
<style>
body { background:#111; color:#eee; font-family:monospace; text-align:center; }
.box { max-width:420px; margin:auto; padding:10px; }
button,input { width:100%; margin:5px 0; padding:6px; font-size:14px; }
.ok { color:#0f0; }
.bad { color:#f55; }
.warn { color:#ff0; }
</style>
</head>
<body>
<div class="box">

<h2>🔑 SED UNLOCK</h2>

<div id="status"></div>

<input id="pw" type="password" placeholder="Password">
<button onclick="unlock()">Unlock</button>

<hr>

<input id="cur" type="password" placeholder="Current Password">
<input id="new" type="password" placeholder="New Password">
<input id="conf" type="password" placeholder="Confirm Password">
<button onclick="changePw()">Change Password</button>

<hr>

<button onclick="boot()">Boot</button>
<button onclick="reboot()">Reboot</button>
<button onclick="shutdown()">Shutdown</button>

</div>

<script>
async function refresh(){
    try {
        let r = await fetch("/status");
        let j = await r.json();

        let html = "";
        let unlocked = false;

        j.drives.forEach(d=>{
            if(d.locked){
                html += `<div class="bad">❌ ${d.device}</div>`;
            } else {
                html += `<div class="ok">✅ ${d.device}</div>`;
                unlocked = true;
            }
        });

        if(unlocked){
            html += `<div class="warn">⚠ Some drives may still be locked</div>`;
        }

        document.getElementById("status").innerHTML = html;
    } catch(e){}
}

async function unlock(){
    let pw = document.getElementById("pw").value;

    let r = await fetch("/unlock", {
        method:"POST",
        body: JSON.stringify({password:pw})
    });

    let j = await r.json();

    if(j.error){
        alert(j.error);
    }

    document.getElementById("pw").value="";
    refresh();
}

async function changePw(){
    let cur = document.getElementById("cur").value;
    let nw  = document.getElementById("new").value;
    let cf  = document.getElementById("conf").value;

    if(nw !== cf){
        alert("Password mismatch");
        return;
    }

    let r = await fetch("/change-password", {
        method:"POST",
        body: JSON.stringify({
            currentPassword:cur,
            newPassword:nw
        })
    });

    let j = await r.json();

    if(j.error){
        alert(j.error);
    } else {
        alert("Password updated");
    }
}

function boot(){
    if(confirm("Boot OS?")){
        fetch("/boot",{method:"POST"});
    }
}

function reboot(){
    if(confirm("Reboot system?")){
        fetch("/reboot",{method:"POST"});
    }
}

function shutdown(){
    if(confirm("Shutdown system?")){
        fetch("/poweroff",{method:"POST"});
    }
}

setInterval(refresh, 5000);
refresh();
</script>

</body>
</html>
