<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SED Unlock</title>

<style>
body { background:#111; color:#ddd; font-family:monospace; text-align:center; }
.box { border:1px solid #444; padding:10px; margin:10px auto; width:320px; }
.btn { display:block; width:100%; margin:5px 0; padding:8px; background:#333; color:#fff; border:none; }
.btn:hover { background:#555; }
input { width:100%; padding:6px; background:#222; color:#fff; border:1px solid #444; }
.ok { color:#4ade80; }
.bad { color:#f87171; }
</style>

</head>
<body>

<h2>🔑 SED UNLOCK</h2>

<div class="box">
<b>Status</b>
<div id="status"></div>
</div>

<div class="box">
<input id="pw" type="password" placeholder="Password">
<button class="btn" onclick="unlock()">Unlock</button>
<button class="btn" onclick="boot()">Boot</button>
<button class="btn" onclick="reboot()">Reboot</button>
</div>

<div class="box">
<b>Results</b>
<div id="results"></div>
</div>

<script>
async function refresh() {
    try {
        let r = await fetch("/status")
        let j = await r.json()

        let out = ""
        let allUnlocked = true

        j.drives.forEach(d => {
            if (d.locked) allUnlocked = false
            out += `<div class="${d.locked?'bad':'ok'}">
                ${d.device} ${d.locked?'LOCKED':'UNLOCKED'}
            </div>`
        })

        document.getElementById("status").innerHTML = out

    } catch {
        document.getElementById("status").innerText = "ERROR"
    }
}

async function unlock() {
    let pw = document.getElementById("pw").value

    let r = await fetch("/unlock", {
        method:"POST",
        body: JSON.stringify({password: pw})
    })

    let j = await r.json()

    let out = ""
    j.results.forEach(x => {
        out += `<div class="${x.success?'ok':'bad'}">
            ${x.device} ${x.success?'OK':'FAIL'}
        </div>`
    })

    document.getElementById("results").innerHTML = out
    document.getElementById("pw").value = ""

    refresh()
}

function boot(){ fetch("/boot",{method:"POST"}) }
function reboot(){ fetch("/reboot",{method:"POST"}) }

refresh()
setInterval(refresh, 30000)
</script>

</body>
</html>
