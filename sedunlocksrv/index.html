<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SED Unlock Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a202c; color: #e2e8f0; }
        .tab-active { border-color: #60a5fa; color: #60a5fa; }
        .tab-inactive { border-color: transparent; color: #94a3b8; }
    </style>
</head>
<body class="flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">🔑 SED Unlock Service</h1>
        
        <!-- Tab Navigation - Remains visible after unlock -->
        <div class="flex mb-6 border-b border-gray-700">
            <button id="unlock-tab-btn" class="w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-active focus:outline-none">
                Unlock
            </button>
            <button id="change-tab-btn" class="w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-inactive hover:text-gray-200 focus:outline-none">
                Change Password
            </button>
        </div>

        <!-- Status Message Area -->
        <div id="message-area" class="hidden text-center p-3 rounded mb-4"></div>

        <!-- Unlock Tab Content -->
        <div id="unlock-tab">
            <form id="unlock-form" class="space-y-4">
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-400 mb-1">Disk Password</label>
                    <input type="password" id="password" name="password" required 
                           class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 focus:outline-none transition text-white pass-field">
                </div>
                
                <div class="flex items-center mb-2">
                    <input type="checkbox" id="show-pass-unlock" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                    <label for="show-pass-unlock" class="ml-2 text-sm font-medium text-gray-400 cursor-pointer">Show Password</label>
                </div>

                <button type="submit" id="submit-btn" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none shadow-md transition duration-200">
                    Unlock Drive(s)
                </button>
            </form>

            <!-- Boot OS Button -->
            <button id="boot-btn" 
                    class="hidden w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded shadow-md transition duration-200 mt-4">
                🚀 Boot Proxmox (kexec)
            </button>

            <!-- Reboot Button -->
            <button id="reboot-btn" 
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-4 rounded shadow-md transition duration-200 mt-4">
                Reboot System
            </button>
        </div>

        <!-- Change Password Tab Content -->
        <div id="change-tab" class="hidden">
            <form id="change-form" class="space-y-4">
                <div>
                    <label for="current-password" class="block text-sm font-medium text-gray-400 mb-1">Current Password</label>
                    <input type="password" id="current-password" required 
                           class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 focus:outline-none transition text-white pass-field">
                </div>
                <div>
                    <label for="new-password" class="block text-sm font-medium text-gray-400 mb-1">New Password</label>
                    <input type="password" id="new-password" required 
                           class="w-full px-4 py-2 rounded bg-gray-700 border border-gray-600 focus:border-blue-500 focus:outline-none transition text-white pass-field">
                </div>

                <div class="flex items-center mb-2">
                    <input type="checkbox" id="show-pass-change" class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                    <label for="show-pass-change" class="ml-2 text-sm font-medium text-gray-400 cursor-pointer">Show Passwords</label>
                </div>

                <button type="submit" id="change-btn" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none shadow-md transition duration-200">
                    Update Password
                </button>
            </form>
        </div>

        <p class="mt-6 text-xs text-center text-gray-500 italic">
            Management functions are available until kexec jump.
        </p>
    </div>

    <script>
        const unlockTabBtn = document.getElementById('unlock-tab-btn');
        const changeTabBtn = document.getElementById('change-tab-btn');
        const unlockTab = document.getElementById('unlock-tab');
        const changeTab = document.getElementById('change-tab');
        const unlockForm = document.getElementById('unlock-form');
        const changeForm = document.getElementById('change-form');
        const submitBtn = document.getElementById('submit-btn');
        const bootBtn = document.getElementById('boot-btn');
        const rebootBtn = document.getElementById('reboot-btn');
        const messageArea = document.getElementById('message-area');

        function setupToggle(checkboxId, tabId) {
            document.getElementById(checkboxId).addEventListener('change', function() {
                const type = this.checked ? 'text' : 'password';
                document.querySelectorAll(`#${tabId} .pass-field`).forEach(el => el.type = type);
            });
        }
        setupToggle('show-pass-unlock', 'unlock-tab');
        setupToggle('show-pass-change', 'change-tab');

        function showTab(tab) {
            // We don't hide the message area anymore so status persists
            if (tab === 'unlock') {
                unlockTab.classList.remove('hidden');
                changeTab.classList.add('hidden');
                unlockTabBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-active focus:outline-none";
                changeTabBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-inactive focus:outline-none";
            } else {
                changeTab.classList.remove('hidden');
                unlockTab.classList.add('hidden');
                changeTabBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-active focus:outline-none";
                unlockTabBtn.className = "w-1/2 py-2 text-sm font-medium text-center border-b-2 tab-inactive focus:outline-none";
            }
        }
        unlockTabBtn.addEventListener('click', () => showTab('unlock'));
        changeTabBtn.addEventListener('click', () => showTab('change'));

        unlockForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "⌛ Processing...";
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/unlock', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();

                if (response.ok) {
                    let statusHtml = `<div class="text-green-400 font-bold mb-2">✅ Unlock Attempt Completed</div>`;
                    statusHtml += `<ul class="text-xs text-left space-y-1">`;
                    
                    let atLeastOneUnlocked = false;
                    data.drives.forEach(drive => {
                        const icon = drive.locked ? "❌" : "✅";
                        const label = drive.locked ? "LOCKED" : "UNLOCKED";
                        statusHtml += `<li>${icon} ${drive.device}: ${label}</li>`;
                        if (!drive.locked) atLeastOneUnlocked = true;
                    });
                    statusHtml += `</ul>`;

                    messageArea.innerHTML = statusHtml;
                    messageArea.className = "block bg-gray-900/50 p-3 rounded mb-4 border border-gray-700";

                    if (atLeastOneUnlocked) {
                        // HIDE ONLY THE FORM, NOT THE TAB CONTENT
                        unlockForm.classList.add('hidden');
                        bootBtn.classList.remove('hidden');
                    } else {
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Unlock Drive(s)";
                    }
                } else {
                    messageArea.innerText = "❌ " + (data.error || "Request Failed");
                    messageArea.className = "block text-red-400 font-bold bg-red-900/30 p-2 rounded mb-4";
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Unlock Drive(s)";
                }
            } catch (err) {
                messageArea.innerText = "❌ Network Error";
                messageArea.className = "block text-red-400 font-bold bg-red-900/30 p-2 rounded mb-4";
                submitBtn.disabled = false;
            }
        });

        bootBtn.addEventListener('click', async () => {
            if (!confirm("Initiate kexec jump? Web connection will terminate.")) return;
            bootBtn.disabled = true;
            bootBtn.innerText = "⌛ Jumping...";
            try {
                await fetch('/boot', { method: 'POST' });
            } catch (err) {
                messageArea.innerHTML = `<div class="text-blue-400">🚀 Connection lost. System is transitioning.</div>`;
            }
        });

        changeForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            try {
                const res = await fetch('/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                const data = await res.json();
                messageArea.innerText = res.ok ? "✅ Password Successfully Changed" : "❌ " + data.error;
                messageArea.className = res.ok ? "block text-green-400 bg-green-900/30 p-2 rounded mb-4" : "block text-red-400 bg-red-900/30 p-2 rounded mb-4";
            } catch (err) {
                messageArea.innerText = "❌ Communication Error";
                messageArea.className = "block text-red-400 bg-red-900/30 p-2 rounded mb-4";
            }
        });

        rebootBtn.addEventListener('click', async () => {
            await fetch('/reboot', { method: 'POST' });
            messageArea.innerText = "🔄 Initializing Reboot...";
            messageArea.className = "block text-orange-400 bg-orange-900/20 p-2 rounded mb-4";
        });
    </script>
</body>
</html>
