name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create releases

jobs:
  create-release:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub release (no binaries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes
